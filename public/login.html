<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in · OutcomeStar</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
<style>
:root{--navy:#201868;--orange:#F07800;--paper:#FAFAF5;--gray:#7A8A9E;--gray-light:#E5E2D9;--gray-dark:#4A5563;--ink:#1a1a2e;}
*{box-sizing:border-box}html,body{margin:0;padding:0}
body{font-family:'Poppins',sans-serif;background:var(--paper);color:var(--gray-dark);min-height:100vh;display:flex;flex-direction:column}
header{background:#fff;border-bottom:1px solid var(--gray-light)}
header .wrap{max-width:1100px;margin:0 auto;padding:14px 24px;display:flex;align-items:baseline;gap:8px}
header a.brand{text-decoration:none;display:flex;align-items:baseline;gap:8px}
header .star{color:var(--orange);font-size:20px}
header .name{font-family:'Lora',serif;font-weight:600;color:var(--navy);font-size:18px;letter-spacing:.2px}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px}
.card{background:#fff;border:1px solid var(--gray-light);border-radius:12px;padding:36px 32px;max-width:440px;width:100%;box-shadow:0 1px 3px rgba(32,24,104,0.04)}
.card h1{font-family:'Lora',serif;color:var(--navy);font-size:26px;font-weight:600;margin:0 0 6px}
.card p.sub{color:var(--gray);font-size:14px;margin:0 0 24px}
label{display:block;font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--gray);font-weight:600;margin:14px 0 5px}
input[type=email],input[type=password]{width:100%;padding:11px 12px;border:1px solid var(--gray-light);border-radius:8px;font-family:'Poppins',sans-serif;font-size:14px;background:#fff}
input:focus{outline:0;border-color:var(--navy)}
.row{display:flex;justify-content:space-between;align-items:center;margin-top:6px}
.row a{color:var(--navy);font-size:13px;text-decoration:none;font-weight:500}
.row a:hover{color:var(--orange)}
button.primary{margin-top:20px;width:100%;background:var(--orange);color:#fff;border:0;border-radius:8px;padding:12px 18px;font-family:'Poppins',sans-serif;font-weight:600;font-size:15px;cursor:pointer}
button.primary:hover{filter:brightness(1.05)}
button.primary:disabled{background:var(--gray);cursor:not-allowed}
.turnstile-wrap{margin-top:16px;min-height:65px;display:flex;justify-content:center}
.err{background:#FEE2E2;color:#991B1B;border:1px solid #FCA5A5;border-radius:8px;padding:10px 12px;font-size:13px;margin-top:14px;display:none}
.err.show{display:block}
.ok{background:#DCFCE7;color:#14532D;border:1px solid #86EFAC;border-radius:8px;padding:10px 12px;font-size:13px;margin-top:14px;display:none}
.ok.show{display:block}
.foot-note{text-align:center;font-size:13px;color:var(--gray);margin-top:20px}
.foot-note a{color:var(--navy);font-weight:600;text-decoration:none}
footer{padding:22px 0;color:var(--gray);font-size:12px;text-align:center;background:#fff;border-top:1px solid var(--gray-light)}
</style>
</head>
<body>
<header>
  <div class="wrap">
    <a class="brand" href="/">
      <span class="star">&#10022;</span>
      <span class="name">OutcomeStar</span>
    </a>
  </div>
</header>
<main>
  <div class="card">
    <h1>Sign in</h1>
    <p class="sub">Welcome back. Sign in to open your family record.</p>
    <form id="loginForm" onsubmit="return doLogin(event)">
      <label for="email">Email</label>
      <input id="email" name="email" type="email" required autocomplete="email">
      <label for="password">Password</label>
      <input id="password" name="password" type="password" required autocomplete="current-password">
      <div class="row">
        <span></span>
        <a href="/reset-password.html">Forgot password?</a>
      </div>
      <div class="turnstile-wrap">
        <div class="cf-turnstile"
             data-sitekey="0x4AAAAAADw4Xqk23WJvTch-"
             data-callback="onTurnstileOK"
             data-error-callback="onTurnstileErr"
             data-expired-callback="onTurnstileExp"></div>
      </div>
      <button class="primary" id="btnSubmit" type="submit" disabled>Sign in</button>
      <div class="err" id="err"></div>
      <div class="ok" id="ok"></div>
    </form>
    <p class="foot-note">Don't have an account? <a href="/signup.html">Create one</a></p>
  </div>
</main>
<footer>&copy; 2026 SRJ Consulting &amp; Services LLC &middot; outcomestar.app</footer>
<script>
var TURNSTILE_TOKEN = null;
var API_BASE = "https://focms-api.onrender.com";

function onTurnstileOK(token){
  TURNSTILE_TOKEN = token;
  document.getElementById("btnSubmit").disabled = false;
}
function onTurnstileErr(){
  TURNSTILE_TOKEN = null;
  document.getElementById("btnSubmit").disabled = true;
  showErr("Verification failed. Please refresh and try again.");
}
function onTurnstileExp(){
  TURNSTILE_TOKEN = null;
  document.getElementById("btnSubmit").disabled = true;
}
function showErr(msg){
  var el = document.getElementById("err");
  el.textContent = msg;
  el.classList.add("show");
  document.getElementById("ok").classList.remove("show");
}
function showOk(msg){
  var el = document.getElementById("ok");
  el.textContent = msg;
  el.classList.add("show");
  document.getElementById("err").classList.remove("show");
}
async function doLogin(ev){
  ev.preventDefault();
  var email = document.getElementById("email").value.trim();
  var pw = document.getElementById("password").value;
  if (!email || !pw){ showErr("Enter email and password."); return false; }
  if (!TURNSTILE_TOKEN){ showErr("Please complete the human check above."); return false; }
  var btn = document.getElementById("btnSubmit");
  btn.disabled = true;
  btn.textContent = "Signing in...";
  try {
    var r = await fetch(API_BASE + "/focms/v1/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email: email, password: pw, turnstile_token: TURNSTILE_TOKEN })
    });
    var body = await r.json().catch(function(){ return {}; });
    if (!r.ok){
      var msg = (body && body.detail && (body.detail.message || body.detail)) || (body && body.message) || ("Sign in failed (HTTP " + r.status + ").");
      showErr(typeof msg === "string" ? msg : "Sign in failed.");
      btn.disabled = false;
      btn.textContent = "Sign in";
      return false;
    }
    var token = body.access_token || body.token || (body.session && body.session.token);
    var user = body.user || {};
    if (token){
      try {
        sessionStorage.setItem("focms_token", token);
        localStorage.setItem("focms_access_token", token);
        localStorage.setItem("focms_user_email", user.email || email);
        if (user.id) localStorage.setItem("focms_user_id", user.id);
        if (user.tenant_id) localStorage.setItem("focms_tenant_id", user.tenant_id);
      } catch(e){}
    }
    showOk("Signed in. Opening your portal...");
    setTimeout(function(){ window.location.href = "/parent_data_entryv166.html"; }, 700);
  } catch(e){
    showErr("Network error: " + (e && e.message ? e.message : "unknown"));
    btn.disabled = false;
    btn.textContent = "Sign in";
  }
  return false;
}
</script>
</body>
</html>
